<!-- MUSIK (FIX FULL & AUTO PLAY STABLE) -->
<audio id="music" loop preload="auto">
  <source src="melukis-senja.mp3" type="audio/mpeg">
</audio>

<script>

let music = document.getElementById("music");

/* 🔥 FIX UTAMA: musik full + anti kepotong */
function playMusic(){
  music.load();              // pastiin file ke-load full
  music.currentTime = 0;     // mulai dari awal
  music.volume = 1;

  let playPromise = music.play();

  if(playPromise !== undefined){
    playPromise.catch(() => {
      // fallback kalau diblock browser
      const enableAudio = () => {
        music.play();
        document.removeEventListener("click", enableAudio);
      };
      document.addEventListener("click", enableAudio);
    });
  }
}

/* === YANG KAMU PUNYA TETEP === */
function openEnvelope(){
  document.getElementById("envelopePage").classList.add("hidden");
  document.getElementById("intro").classList.remove("hidden");

  playMusic(); // 🔥 NYALA PAS BUKA
}

function start(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("passwordPage").classList.remove("hidden");

  playMusic();
}

function checkPassword(){
  let pw = document.getElementById("password").value;

  if(pw === "chloecantik"){
    document.getElementById("passwordPage").classList.add("hidden");
    document.getElementById("messagePage").classList.remove("hidden");

    playMusic();
  } else {
    alert("kan akuu udah kirim terus di iggg");
  }
}

</script>
