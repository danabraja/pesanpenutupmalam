<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surat Malam 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'Honeybee';
  src: url('Honeybee.ttf') format('truetype');
}

body {
  margin: 0;
  font-family: 'Honeybee', 'Poppins', sans-serif;
  min-height: 100vh;
  background: linear-gradient(rgba(255,105,180,0.3), rgba(0,0,0,0.5)),
              url("bg.jpg") no-repeat center center;
  background-size: cover;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container { padding: 30px; }

.card {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 25px;
  margin: 20px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff1a75, #ff66b2);
  color: white;
  cursor: pointer;
}

.hidden { display: none; }

.envelope {
  width: 200px;
  height: 130px;
  background: #ff4da6;
  margin: 120px auto;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff1a75;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transition: 0.6s;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: white;
  color: #ff4da6;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.heart {
  position: fixed;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelopePage" class="container">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="letter">💌</div>
  </div>
  <p>Klik suratnyaa</p>
</div>

<!-- INTRO -->
<div id="intro" class="container card hidden">
  <h1>💌 Sepucuk kata di ujung hari</h1>
  <button onclick="start()">Buka</button>
</div>

<!-- PASSWORD -->
<div id="passwordPage" class="container card hidden">
  <h2>Masukin secret code</h2>
  <input type="password" id="password">
  <button onclick="checkPassword()">Masuk</button>
</div>

<!-- MESSAGE -->
<div id="messagePage" class="container card hidden">
  <p>
  selamat malam Cantik 💖<br><br>
  semoga kamu selalu sehat, bahagia, dan dimudahkan semuanya 🌙
  </p>
  <button onclick="nextPage('q1')">Lanjut</button>
</div>

<!-- Q1 -->
<div id="q1" class="container card hidden">
  <h3>Apa kabar hari ini?</h3>
  <textarea id="jawab1"></textarea>
  <button onclick="nextPage('q2')">Lanjut</button>
</div>

<!-- Q2 -->
<div id="q2" class="container card hidden">
  <h3>Ceritain harimu</h3>
  <textarea id="jawab2"></textarea>
  <button onclick="nextPage('q3')">Lanjut</button>
</div>

<!-- Q3 -->
<div id="q3" class="container card hidden">
  <h3>Menurut kamu aku gimana?</h3>
  <textarea id="jawab3"></textarea>
  <button onclick="nextPage('q4')">Lanjut</button>
</div>

<!-- Q4 -->
<div id="q4" class="container card hidden">
  <h3>Harapan kamu?</h3>
  <textarea id="jawab4"></textarea>
  <button onclick="send()">Kirim</button>
</div>

<!-- CLOSING -->
<div id="closing" class="container card hidden">
  <h1>Good Night 💖</h1>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="melukis-senja.mp3" type="audio/mp3">
</audio>

<script>

function openEnvelope(){
  document.querySelector('.envelope').classList.add('open');

  setTimeout(()=>{
    document.getElementById('envelopePage').classList.add('hidden');
    document.getElementById('intro').classList.remove('hidden');
  }, 800);
}

/* 🔥 MUSIK NYALA DI SINI (PAS KLIK BUKA) */
function start(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('passwordPage').classList.remove('hidden');

  const music = document.getElementById("music");
  music.volume = 0.6;
  music.play().catch(err => console.log("music blocked:", err));

  createHearts();
}

function checkPassword(){
  let pw = document.getElementById("password").value;

  if(pw === "chloecantik"){
    document.getElementById('passwordPage').classList.add('hidden');
    document.getElementById('messagePage').classList.remove('hidden');
  } else {
    alert("Password salah 😅");
  }
}

function nextPage(id){
  document.querySelectorAll('.container').forEach(e => e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function send(){
  let a1 = document.getElementById("jawab1").value;
  let a2 = document.getElementById("jawab2").value;
  let a3 = document.getElementById("jawab3").value;
  let a4 = document.getElementById("jawab4").value;

  if(!a4) return alert("Isi dulu ya 💖");

  let formData = new FormData();
  formData.append("Kabar", a1);
  formData.append("Cerita", a2);
  formData.append("Pendapat", a3);
  formData.append("Harapan", a4);

  fetch("https://formspree.io/f/xpqbqrka", {
    method: "POST",
    body: formData,
    headers: { 'Accept': 'application/json' }
  }).then(res=>{
    if(res.ok){
      nextPage('closing');
      document.body.style.opacity = "0.7";
    }
  });
}

function createHearts(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },400);
}

</script>

</body>
</html>
