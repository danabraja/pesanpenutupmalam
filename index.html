<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surat Malam 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'Honeybee';
  src: url('Honeybee.ttf') format('truetype');
}

body {
  margin: 0;
  font-family: 'Honeybee','Poppins',sans-serif;
  min-height: 100vh;

  background: linear-gradient(rgba(255,105,180,0.3), rgba(0,0,0,0.5)),
              url("bg.jpg") center/cover no-repeat;

  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border-radius: 25px;
  padding: 25px;
  margin: 20px;
  box-shadow: 0 0 25px rgba(255,105,180,0.4);
}

/* INPUT IMUT */
textarea {
  width: 80%;
  padding: 15px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.9);
  color: #ff4da6;
  font-size: 14px;
  outline: none;
  transition: 0.3s;
}

textarea:focus {
  box-shadow: 0 0 15px rgba(255,105,180,0.8);
  transform: scale(1.02);
}

/* BUTTON */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg,#ff1a75,#ff66b2);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
}

.hidden { display:none; }

/* ENVELOPE */
.envelope {
  width:200px;
  height:130px;
  background:#ff4da6;
  margin:120px auto;
  border-radius:10px;
  cursor:pointer;
}

/* LOVE FLOAT */
.heart {
  position: fixed;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {transform:translateY(100vh);}
  to {transform:translateY(-10vh);}
}
</style>
</head>

<body onclick="playMusic()">

<!-- ENVELOPE -->
<div id="envelopePage">
  <div class="envelope" onclick="openEnvelope()"></div>
  <p>Klik suratnyaa 💌</p>
</div>

<!-- INTRO -->
<div id="intro" class="card hidden">
  <h1>💌Sepucuk kata di ujung hariiii</h1>
  <div>untuk Chloee</div>
  <button onclick="start()">Bukaa</button>
</div>

<!-- PASSWORD -->
<div id="passwordPage" class="card hidden">
  <h2>masukin secret code yaa</h2>
  <input type="password" id="password">
  <br>
  <button onclick="checkPassword()">Masuk</button>
</div>

<!-- PESAN -->
<div id="messagePage" class="card hidden">
  <p>
  selamat malam Cantikkkk <br><br>
  balik lagi sama gw di pesan gw ini... <br><br>
  good night chloeeee 💖
  </p>
  <button onclick="next('q1')">Lanjuttt</button>
</div>

<!-- Q1 -->
<div id="q1" class="card hidden">
  <h3>Apa kabar lu hari ini?</h3>
  <textarea id="jawab1"></textarea>
  <button onclick="next('q2')">Lanjut</button>
</div>

<!-- Q2 -->
<div id="q2" class="card hidden">
  <h3>ceritain dong hari ini gimana?</h3>
  <textarea id="jawab2"></textarea>
  <button onclick="next('q3')">Lanjut</button>
</div>

<!-- Q3 -->
<div id="q3" class="card hidden">
  <h3>Menurut lu gw gimana?</h3>
  <textarea id="jawab3"></textarea>
  <button onclick="next('q4')">Lanjut</button>
</div>

<!-- Q4 -->
<div id="q4" class="card hidden">
  <h3>Harapan bulan ini?</h3>
  <textarea id="jawab4"></textarea>
  <button onclick="send()">Kirim</button>
</div>

<!-- CLOSING -->
<div id="closing" class="card hidden">
  <h1>Good Nightttt 💖</h1>
</div>

<audio id="music" loop>
  <source src="melukis-senja.mp3" type="audio/mp3">
</audio>

<script>
let played = false;

function playMusic(){
  if(!played){
    document.getElementById("music").play();
    played = true;
  }
}

function openEnvelope(){
  document.getElementById('envelopePage').classList.add('hidden');
  document.getElementById('intro').classList.remove('hidden');
}

function start(){
  intro.classList.add('hidden');
  passwordPage.classList.remove('hidden');
}

function checkPassword(){
  if(password.value==="chloecantik"){
    passwordPage.classList.add('hidden');
    messagePage.classList.remove('hidden');
  } else alert("salah 😜");
}

function next(id){
  document.querySelectorAll('.card').forEach(e=>e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function send(){
  next('closing');
}
</script>

</body>
</html>
